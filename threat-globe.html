<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Threat Globe — Temple of Doom</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0c;
  --bg2: #0d0d10;
  --bg3: #111116;
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.12);
  --green-mid: rgba(0,255,136,0.35);
  --gold: #c8a96e;
  --text: #f5f2ec;
  --text-dim: rgba(245,242,236,0.5);
  --text-faint: rgba(245,242,236,0.2);
  --border: rgba(255,255,255,0.06);
  --border-green: rgba(0,255,136,0.2);
  --mono: 'Share Tech Mono', monospace;
  --head: 'Rajdhani', sans-serif;
  --red: #ff3333;
  --orange: #ff8800;
  --yellow: #ffcc00;
  --cyan: #00ccff;
}
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: var(--head);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  display: flex;
  flex-direction: column;
}

/* NAV */
nav {
  position: relative; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.75rem 2rem;
  background: rgba(10,10,12,0.96); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-green);
  flex-shrink: 0;
}
.nav-back {
  font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.12em;
  color: var(--green); text-decoration: none; transition: opacity 0.2s;
}
.nav-back:hover { opacity: 0.7; }
.nav-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.3em;
  color: var(--text-faint); text-transform: uppercase;
}
.nav-right {
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.2em;
  color: var(--text-faint); text-transform: uppercase;
}

/* MAIN LAYOUT */
.globe-layout {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* GLOBE CANVAS AREA */
#globe-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
}
#globe-container:active { cursor: grabbing; }
#globe-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* HEADER OVERLAY */
.globe-header {
  position: absolute;
  top: 1.25rem;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  z-index: 10;
}
.live-label {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  color: var(--green);
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}
.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red), 0 0 16px var(--red);
  animation: blink 1s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.globe-title {
  font-family: var(--head);
  font-size: clamp(1.4rem, 2.5vw, 2.2rem);
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
  text-shadow: 0 0 40px rgba(0,255,136,0.35), 0 0 80px rgba(0,255,136,0.15);
}

/* STATS BAR */
.stats-bar {
  position: absolute;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 1px;
  z-index: 10;
  pointer-events: none;
  background: var(--border-green);
  border: 1px solid var(--border-green);
  backdrop-filter: blur(12px);
}
.stat-block {
  background: rgba(10,10,12,0.88);
  padding: 0.8rem 1.6rem;
  text-align: center;
  min-width: 130px;
  position: relative;
}
.stat-block::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--green-mid), transparent);
}
.stat-val {
  font-family: var(--mono);
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
  text-shadow: 0 0 20px rgba(0,255,136,0.5);
}
.stat-label {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-top: 0.3rem;
}
.stat-block.critical .stat-val { color: var(--red); text-shadow: 0 0 20px rgba(255,51,51,0.5); }

/* DISCLAIMER */
.disclaimer {
  position: absolute;
  bottom: 0.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
}

/* SIDEBAR */
.sidebar {
  width: 320px;
  flex-shrink: 0;
  background: rgba(10,10,12,0.95);
  border-left: 1px solid var(--border-green);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(8px);
}
.sidebar-header {
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-title {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.3em;
  color: var(--green);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.sidebar-title::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 1.4s ease infinite;
  flex-shrink: 0;
}
.feed-count {
  margin-left: auto;
  font-size: 0.58rem;
  color: var(--text-faint);
}

/* LEGEND */
.legend {
  padding: 0.6rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 0.9rem;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-family: var(--mono);
  font-size: 0.56rem;
  letter-spacing: 0.12em;
  color: var(--text-faint);
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-dot.critical { background: var(--red); box-shadow: 0 0 6px var(--red); }
.legend-dot.high { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
.legend-dot.medium { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
.legend-dot.low { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }

/* FEED */
.feed {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem 0;
}
.feed::-webkit-scrollbar { width: 3px; }
.feed::-webkit-scrollbar-track { background: transparent; }
.feed::-webkit-scrollbar-thumb { background: var(--border-green); border-radius: 2px; }

.feed-item {
  padding: 0.65rem 1.25rem;
  border-bottom: 1px solid var(--border);
  animation: slideIn 0.3s ease;
  position: relative;
}
.feed-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.feed-item.CRITICAL::before { background: var(--red); box-shadow: 0 0 6px var(--red); }
.feed-item.HIGH::before { background: var(--orange); }
.feed-item.MED::before { background: var(--yellow); }
.feed-item.LOW::before { background: var(--cyan); }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(10px); background: rgba(0,255,136,0.06); }
  to { opacity: 1; transform: translateX(0); background: transparent; }
}
.feed-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.25rem;
}
.feed-time {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--text-faint);
  letter-spacing: 0.08em;
}
.feed-severity {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  padding: 0.1rem 0.4rem;
  border-radius: 2px;
}
.feed-severity.CRITICAL { color: var(--red); border: 1px solid rgba(255,51,51,0.4); background: rgba(255,51,51,0.08); }
.feed-severity.HIGH { color: var(--orange); border: 1px solid rgba(255,136,0,0.4); background: rgba(255,136,0,0.08); }
.feed-severity.MED { color: var(--yellow); border: 1px solid rgba(255,204,0,0.4); background: rgba(255,204,0,0.08); }
.feed-severity.LOW { color: var(--cyan); border: 1px solid rgba(0,204,255,0.4); background: rgba(0,204,255,0.08); }

.feed-route {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--text);
  letter-spacing: 0.05em;
  margin-bottom: 0.15rem;
}
.feed-arrow { color: var(--text-faint); margin: 0 0.3rem; }
.feed-type {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* SCAN LINE EFFECT */
.scanline-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

/* CORNER DECORATIONS */
.corner-tl, .corner-tr, .corner-bl, .corner-br {
  position: absolute;
  width: 20px; height: 20px;
  pointer-events: none;
  z-index: 11;
}
.corner-tl { top: 5px; left: 5px; border-top: 1px solid var(--green); border-left: 1px solid var(--green); }
.corner-tr { top: 5px; right: 5px; border-top: 1px solid var(--green); border-right: 1px solid var(--green); }
.corner-bl { bottom: 5px; left: 5px; border-bottom: 1px solid var(--green); border-left: 1px solid var(--green); }
.corner-br { bottom: 5px; right: 5px; border-bottom: 1px solid var(--green); border-right: 1px solid var(--green); }

/* ── GOLD CURSOR ── */
body { cursor: none; }
a, button, [role="button"], input, textarea, select { cursor: none; }
#cursor {
  position: fixed; pointer-events: none; z-index: 99999;
  width: 8px; height: 8px;
  transform: translate(-50%, -50%);
  background: rgba(184,147,58,0.95);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(184,147,58,0.5);
  transition: width 0.12s ease, height 0.12s ease;
}
body.cursor-hover #cursor { width: 12px; height: 12px; box-shadow: 0 0 14px rgba(184,147,58,0.7); }
@keyframes trailFade {
  0%   { opacity: 0.75; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0;    transform: translate(-50%, calc(-50% - 22px)) scale(0.1); }
}
.cursor-trail {
  position: fixed; width: 5px; height: 5px; border-radius: 50%;
  background: rgba(184,147,58,0.7); pointer-events: none; z-index: 99998;
  animation: trailFade 0.55s forwards;
}
@media (max-width: 768px) {
  body { cursor: auto !important; }
  a, button, [role="button"], input, textarea, select { cursor: auto !important; }
  #cursor, .cursor-trail { display: none !important; }
}

html { font-size: 18px; }
</style>
</head>
<body>

<div class="scanline-overlay"></div>

<nav>
  <a href="/" class="nav-back">← PORTFOLIO</a>
  <span class="nav-center">THREAT GLOBE v2.0</span>
  <span class="nav-right">SIM MODE ACTIVE</span>
</nav>

<div class="globe-layout">

  <!-- GLOBE -->
  <div id="globe-container">
    <canvas id="globe-canvas"></canvas>

    <!-- Decorative corners -->
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <!-- Header -->
    <div class="globe-header">
      <div class="live-label">
        <div class="live-dot"></div>
        LIVE THREAT INTELLIGENCE
      </div>
      <div class="globe-title">GLOBAL CYBERATTACK MONITOR</div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-block">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-label">Total Attacks</div>
      </div>
      <div class="stat-block">
        <div class="stat-val" id="stat-active">0</div>
        <div class="stat-label">Active Threats</div>
      </div>
      <div class="stat-block">
        <div class="stat-val" id="stat-countries">0</div>
        <div class="stat-label">Countries Targeted</div>
      </div>
      <div class="stat-block critical">
        <div class="stat-val" id="stat-critical">0</div>
        <div class="stat-label">Critical Alerts</div>
      </div>
    </div>

    <!-- Disclaimer -->
    <div class="disclaimer">⚠ SIMULATED DATA — FOR DEMONSTRATION PURPOSES ONLY</div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        ATTACK FEED
        <span class="feed-count" id="feed-count">0 EVENTS</span>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot critical"></div>CRITICAL</div>
      <div class="legend-item"><div class="legend-dot high"></div>HIGH</div>
      <div class="legend-item"><div class="legend-dot medium"></div>MED</div>
      <div class="legend-item"><div class="legend-dot low"></div>LOW</div>
    </div>
    <div class="feed" id="attack-feed"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ─── CITY DATA ──────────────────────────────────────────────────────────────
const CITIES = [
  { name: 'New York',      country: 'USA',          lat: 40.71,  lng: -74.01 },
  { name: 'London',        country: 'UK',           lat: 51.51,  lng: -0.13  },
  { name: 'Tokyo',         country: 'Japan',        lat: 35.69,  lng: 139.69 },
  { name: 'Moscow',        country: 'Russia',       lat: 55.75,  lng: 37.62  },
  { name: 'Beijing',       country: 'China',        lat: 39.91,  lng: 116.39 },
  { name: 'Sydney',        country: 'Australia',    lat: -33.87, lng: 151.21 },
  { name: 'Berlin',        country: 'Germany',      lat: 52.52,  lng: 13.41  },
  { name: 'São Paulo',     country: 'Brazil',       lat: -23.55, lng: -46.63 },
  { name: 'Mumbai',        country: 'India',        lat: 19.08,  lng: 72.88  },
  { name: 'Dubai',         country: 'UAE',          lat: 25.20,  lng: 55.27  },
  { name: 'Toronto',       country: 'Canada',       lat: 43.65,  lng: -79.38 },
  { name: 'Paris',         country: 'France',       lat: 48.85,  lng: 2.35   },
  { name: 'Seoul',         country: 'South Korea',  lat: 37.57,  lng: 126.98 },
  { name: 'Singapore',     country: 'Singapore',    lat: 1.35,   lng: 103.82 },
  { name: 'Lagos',         country: 'Nigeria',      lat: 6.52,   lng: 3.38   },
  { name: 'Cairo',         country: 'Egypt',        lat: 30.04,  lng: 31.24  },
  { name: 'Mexico City',   country: 'Mexico',       lat: 19.43,  lng: -99.13 },
  { name: 'Buenos Aires',  country: 'Argentina',    lat: -34.60, lng: -58.38 },
  { name: 'Stockholm',     country: 'Sweden',       lat: 59.33,  lng: 18.07  },
  { name: 'Amsterdam',     country: 'Netherlands',  lat: 52.37,  lng: 4.90   },
];

const ATTACK_TYPES = ['DDoS', 'Ransomware', 'Phishing', 'SQLi', 'XSS', 'Brute Force', 'MITM'];
const SEVERITIES   = ['LOW', 'MED', 'HIGH', 'CRITICAL'];
const SEV_WEIGHTS  = [0.35, 0.30, 0.22, 0.13];
const SEV_COLORS   = {
  CRITICAL: 0xff3333,
  HIGH:     0xff8800,
  MED:      0xffcc00,
  LOW:      0x00ccff,
};
const SEV_HEX = {
  CRITICAL: '#ff3333',
  HIGH:     '#ff8800',
  MED:      '#ffcc00',
  LOW:      '#00ccff',
};

// ─── THREE.JS SETUP ──────────────────────────────────────────────────────────
const container = document.getElementById('globe-container');
const canvas    = document.getElementById('globe-canvas');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0c, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(0, 0, 2.8);

const GLOBE_R = 1.0;

// ─── AMBIENT GLOW ────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 1.8);
scene.add(ambientLight);

// Sun-like directional light for depth
const sunLight = new THREE.DirectionalLight(0xfff8ee, 2.5);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);

// Fill light from the other side so dark side isn't pitch black
const fillLight = new THREE.DirectionalLight(0x223355, 0.6);
fillLight.position.set(-5, -2, -3);
scene.add(fillLight);

// ─── GLOBE SPHERE WITH EARTH TEXTURE ─────────────────────────────────────────
const sphereGeo = new THREE.SphereGeometry(GLOBE_R, 64, 64);
const sphereMat = new THREE.MeshPhongMaterial({
  color: 0x336699,           // brighter ocean blue placeholder while texture loads
  specular: new THREE.Color(0x8899cc),
  shininess: 30,
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
scene.add(sphere);

// Load Earth texture — raw.githubusercontent.com guarantees CORS (Access-Control-Allow-Origin: *)
// and definitely contains the three.js example texture files
(function loadEarthTexture() {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    const tex = new THREE.Texture(img);
    tex.needsUpdate = true;
    sphereMat.map = tex;
    sphereMat.color.set(0xffffff); // let texture show true colors
    sphereMat.needsUpdate = true;
  };
  img.onerror = function() {
    // Try Wikimedia Blue Marble if GitHub raw fails
    const img2 = new Image();
    img2.crossOrigin = 'anonymous';
    img2.onload = function() {
      const tex = new THREE.Texture(img2);
      tex.needsUpdate = true;
      sphereMat.map = tex;
      sphereMat.color.set(0xffffff);
      sphereMat.needsUpdate = true;
    };
    img2.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Land_ocean_ice_2048.jpg/2048px-Land_ocean_ice_2048.jpg';
  };
  img.src = 'https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/planets/earth_atmos_2048.jpg';
})();

// ─── ATMOSPHERE GLOW ────────────────────────────────────────────────────────
const atmosphereGeo = new THREE.SphereGeometry(GLOBE_R * 1.06, 64, 64);
const atmosphereMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  transparent: true,
  uniforms: { glowColor: { value: new THREE.Color(0x00ff88) } },
  vertexShader: `
    varying vec3 vNormal;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 glowColor;
    varying vec3 vNormal;
    void main() {
      float intensity = pow(0.7 - dot(vNormal, vec3(0,0,1.0)), 3.0);
      gl_FragColor = vec4(glowColor, intensity * 1.1);
    }
  `,
});
scene.add(new THREE.Mesh(atmosphereGeo, atmosphereMat));

// ─── LAT/LNG → 3D VECTOR ─────────────────────────────────────────────────────
function latLngToVec3(lat, lng, r) {
  const phi   = (90 - lat) * (Math.PI / 180);
  const theta = (lng + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

// ─── LATITUDE LINES ──────────────────────────────────────────────────────────
const lineGroup = new THREE.Group();
scene.add(lineGroup);

function makeLine(points, color, opacity) {
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
  return new THREE.Line(geo, mat);
}

// Latitude rings
for (let lat = -75; lat <= 75; lat += 15) {
  const pts = [];
  for (let lng = 0; lng <= 360; lng += 2) {
    pts.push(latLngToVec3(lat, lng - 180, GLOBE_R + 0.001));
  }
  const opacity = lat === 0 ? 0.25 : 0.07;
  lineGroup.add(makeLine(pts, 0x00ff88, opacity));
}

// Longitude meridians
for (let lng = 0; lng < 360; lng += 15) {
  const pts = [];
  for (let lat = -90; lat <= 90; lat += 2) {
    pts.push(latLngToVec3(lat, lng - 180, GLOBE_R + 0.001));
  }
  lineGroup.add(makeLine(pts, 0x00ff88, 0.07));
}

// ─── CITY DOTS ───────────────────────────────────────────────────────────────
const cityObjects = [];
CITIES.forEach(city => {
  const pos = latLngToVec3(city.lat, city.lng, GLOBE_R + 0.015);

  // Outer glow ring
  const ringGeo = new THREE.RingGeometry(0.018, 0.028, 16);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.lookAt(new THREE.Vector3(0,0,0));
  lineGroup.add(ring);

  // Core dot
  const dotGeo = new THREE.SphereGeometry(0.013, 8, 8);
  const dotMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
  const dot    = new THREE.Mesh(dotGeo, dotMat);
  dot.position.copy(pos);
  lineGroup.add(dot);

  cityObjects.push({ city, pos, dot, ring, dotMat, ringMat, pulseT: 0, pulsing: false });
});

// ─── ARC MANAGEMENT ──────────────────────────────────────────────────────────
const arcGroup = new THREE.Group();
scene.add(arcGroup);

const activeArcs = [];

function bezier3(p0, p1, p2, t) {
  const a = p0.clone().multiplyScalar((1-t)*(1-t));
  const b = p1.clone().multiplyScalar(2*(1-t)*t);
  const c = p2.clone().multiplyScalar(t*t);
  return a.add(b).add(c);
}

function spawnArc(srcCity, dstCity, severity) {
  const color   = SEV_COLORS[severity];
  const hexcol  = SEV_HEX[severity];
  const srcPos  = latLngToVec3(srcCity.lat, srcCity.lng, GLOBE_R);
  const dstPos  = latLngToVec3(dstCity.lat, dstCity.lng, GLOBE_R);

  // Control point — midpoint pushed outward
  const mid  = srcPos.clone().add(dstPos).multiplyScalar(0.5);
  const dist = srcPos.distanceTo(dstPos);
  const ctrl = mid.clone().normalize().multiplyScalar(GLOBE_R + 0.35 + dist * 0.35);

  // Pre-sample the full curve
  const SEGMENTS = 80;
  const curvePts = [];
  for (let i = 0; i <= SEGMENTS; i++) {
    curvePts.push(bezier3(srcPos, ctrl, dstPos, i / SEGMENTS));
  }

  // Build geometry with subset of points (grows as t advances)
  const positions = new Float32Array((SEGMENTS + 1) * 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setDrawRange(0, 0);

  const mat  = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.85 });
  const line = new THREE.Line(geo, mat);
  arcGroup.add(line);

  // Head glow sphere
  const headGeo = new THREE.SphereGeometry(0.016, 8, 8);
  const headMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
  const head    = new THREE.Mesh(headGeo, headMat);
  arcGroup.add(head);

  // Mark destination city for pulsing
  const dstObj = cityObjects.find(c => c.city.name === dstCity.name);
  if (dstObj) { dstObj.pulsing = true; dstObj.pulseT = 0; }

  const arc = { line, head, headMat, mat, curvePts, t: 0, done: false, severity, dstObj };
  activeArcs.push(arc);
  return arc;
}

// ─── STATS ───────────────────────────────────────────────────────────────────
let statTotal     = 0;
let statActive    = 0;
let statCritical  = 0;
const targetedSet = new Set();

const elTotal     = document.getElementById('stat-total');
const elActive    = document.getElementById('stat-active');
const elCountries = document.getElementById('stat-countries');
const elCritical  = document.getElementById('stat-critical');

function updateStats() {
  elTotal.textContent     = statTotal.toLocaleString();
  elActive.textContent    = statActive;
  elCountries.textContent = targetedSet.size;
  elCritical.textContent  = statCritical.toLocaleString();
}

// ─── FEED ─────────────────────────────────────────────────────────────────────
const feedEl    = document.getElementById('attack-feed');
const feedCount = document.getElementById('feed-count');
let feedTotal   = 0;
const MAX_FEED  = 60;

function pickSeverity() {
  const r = Math.random();
  let acc = 0;
  for (let i = 0; i < SEVERITIES.length; i++) {
    acc += SEV_WEIGHTS[i];
    if (r < acc) return SEVERITIES[i];
  }
  return 'LOW';
}

function zeroPad(n) { return String(n).padStart(2,'0'); }

function nowStr() {
  const d = new Date();
  return `${zeroPad(d.getHours())}:${zeroPad(d.getMinutes())}:${zeroPad(d.getSeconds())}`;
}

function addFeedEntry(srcCity, dstCity, attackType, severity) {
  feedTotal++;
  feedCount.textContent = `${feedTotal} EVENTS`;

  const item = document.createElement('div');
  item.className = `feed-item ${severity}`;

  item.innerHTML = `
    <div class="feed-top">
      <span class="feed-time">${nowStr()}</span>
      <span class="feed-severity ${severity}">${severity}</span>
    </div>
    <div class="feed-route">
      ${srcCity.country}<span class="feed-arrow">→</span>${dstCity.country}
    </div>
    <div class="feed-type">${attackType} &nbsp;|&nbsp; ${srcCity.name} → ${dstCity.name}</div>
  `;

  feedEl.insertBefore(item, feedEl.firstChild);

  // Trim old entries
  while (feedEl.children.length > MAX_FEED) {
    feedEl.removeChild(feedEl.lastChild);
  }
}

// ─── SPAWN ATTACK ─────────────────────────────────────────────────────────────
function spawnAttack() {
  let srcIdx = Math.floor(Math.random() * CITIES.length);
  let dstIdx = Math.floor(Math.random() * CITIES.length);
  while (dstIdx === srcIdx) dstIdx = Math.floor(Math.random() * CITIES.length);

  const src      = CITIES[srcIdx];
  const dst      = CITIES[dstIdx];
  const severity = pickSeverity();
  const type     = ATTACK_TYPES[Math.floor(Math.random() * ATTACK_TYPES.length)];

  spawnArc(src, dst, severity);
  addFeedEntry(src, dst, type, severity);

  statTotal++;
  statActive++;
  targetedSet.add(dst.country);
  if (severity === 'CRITICAL') statCritical++;
  updateStats();
}

// ─── ORBIT CONTROLS (manual drag) ────────────────────────────────────────────
let isDragging  = false;
let prevMouse   = { x: 0, y: 0 };
let rotVelX     = 0;
let rotVelY     = 0;
let autoRotate  = true;

container.addEventListener('mousedown', e => {
  isDragging = true;
  autoRotate = false;
  prevMouse  = { x: e.clientX, y: e.clientY };
  rotVelX = rotVelY = 0;
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  // Resume auto-rotate after 3 s of no drag
  clearTimeout(autoRotateTimer);
  autoRotateTimer = setTimeout(() => { autoRotate = true; }, 3000);
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  rotVelX = dy * 0.004;
  rotVelY = dx * 0.004;
  lineGroup.rotation.x += rotVelX;
  lineGroup.rotation.y += rotVelY;
  sphere.rotation.x    += rotVelX;
  sphere.rotation.y    += rotVelY;
  arcGroup.rotation.x  += rotVelX;
  arcGroup.rotation.y  += rotVelY;
  prevMouse = { x: e.clientX, y: e.clientY };
});

// Touch support
container.addEventListener('touchstart', e => {
  isDragging = true;
  autoRotate = false;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  rotVelX = rotVelY = 0;
}, { passive: true });
window.addEventListener('touchend', () => {
  isDragging = false;
  clearTimeout(autoRotateTimer);
  autoRotateTimer = setTimeout(() => { autoRotate = true; }, 3000);
});
window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  rotVelX = dy * 0.004;
  rotVelY = dx * 0.004;
  lineGroup.rotation.x += rotVelX;
  lineGroup.rotation.y += rotVelY;
  sphere.rotation.x    += rotVelX;
  sphere.rotation.y    += rotVelY;
  arcGroup.rotation.x  += rotVelX;
  arcGroup.rotation.y  += rotVelY;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });

let autoRotateTimer = null;

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function onResize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
const ARC_SPEED  = 0.008;
const AUTO_SPEED = 0.0015;

let lastSpawn = 0;
let nextSpawnDelay = 1200;

function animate(timestamp) {
  requestAnimationFrame(animate);

  // Auto rotate
  if (autoRotate && !isDragging) {
    lineGroup.rotation.y += AUTO_SPEED;
    sphere.rotation.y    += AUTO_SPEED;
    arcGroup.rotation.y  += AUTO_SPEED;
  } else if (!isDragging) {
    rotVelX *= 0.92;
    rotVelY *= 0.92;
  }

  // Spawn new attacks
  if (timestamp - lastSpawn > nextSpawnDelay) {
    const count = Math.random() < 0.3 ? 2 : 1;
    for (let i = 0; i < count; i++) spawnAttack();
    lastSpawn = timestamp;
    nextSpawnDelay = 800 + Math.random() * 1800;
  }

  // Update arcs
  for (let i = activeArcs.length - 1; i >= 0; i--) {
    const arc = activeArcs[i];
    if (arc.done) continue;

    arc.t = Math.min(arc.t + ARC_SPEED, 1);
    const progress = arc.t;
    const segCount = Math.floor(progress * arc.curvePts.length);
    const positions = arc.line.geometry.attributes.position.array;

    for (let s = 0; s < segCount; s++) {
      const pt = arc.curvePts[s];
      positions[s * 3]     = pt.x;
      positions[s * 3 + 1] = pt.y;
      positions[s * 3 + 2] = pt.z;
    }
    arc.line.geometry.attributes.position.needsUpdate = true;
    arc.line.geometry.setDrawRange(0, segCount);

    // Move head
    if (segCount > 0) {
      const headPt = arc.curvePts[Math.min(segCount, arc.curvePts.length - 1)];
      arc.head.position.copy(headPt);
    }

    // Fade tail
    arc.mat.opacity = 0.85 - progress * 0.4;

    if (arc.t >= 1) {
      arc.done = true;
      statActive = Math.max(0, statActive - 1);
      updateStats();

      // Flash destination
      if (arc.dstObj) {
        arc.dstObj.pulsing = true;
        arc.dstObj.pulseT  = 0;
      }

      // Fade out after 1.5s
      const lineRef = arc.line;
      const headRef = arc.head;
      setTimeout(() => {
        arcGroup.remove(lineRef);
        arcGroup.remove(headRef);
        lineRef.geometry.dispose();
        lineRef.material.dispose();
        headRef.geometry.dispose();
        headRef.material.dispose();
      }, 1500);
    }
  }

  // City pulse animations
  cityObjects.forEach(obj => {
    if (obj.pulsing) {
      obj.pulseT += 0.06;
      const s = 1 + Math.sin(obj.pulseT * Math.PI) * 0.9;
      obj.ring.scale.set(s, s, s);
      obj.ringMat.opacity = 0.6 * Math.max(0, Math.sin(obj.pulseT * Math.PI));
      obj.dotMat.color.setHex(obj.pulseT < Math.PI ? 0xffffff : 0x00ff88);
      if (obj.pulseT >= Math.PI * 1.5) {
        obj.pulsing = false;
        obj.ring.scale.set(1,1,1);
        obj.ringMat.opacity = 0.3;
        obj.dotMat.color.setHex(0x00ff88);
      }
    }
  });

  renderer.render(scene, camera);
}

// ─── KICK OFF ─────────────────────────────────────────────────────────────────
// Pre-seed a few attacks
for (let i = 0; i < 4; i++) spawnAttack();
animate(0);
</script>
<div id="cursor"></div>
<script>
(function(){
  const c = document.getElementById('cursor');
  if(!c) return;
  let t = 0;
  document.addEventListener('mousemove', e => {
    c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px';
    const now = Date.now();
    if(now - t > 40){ t = now;
      const p = document.createElement('div'); p.className = 'cursor-trail';
      p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
      document.body.appendChild(p); setTimeout(() => p.remove(), 560);
    }
  });
  document.addEventListener('mouseleave', () => c.style.opacity = '0');
  document.addEventListener('mouseenter', () => c.style.opacity = '1');
  document.querySelectorAll('a,button,[role="button"]').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
  });
})();
</script>
