<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#08090e;--dark:#0d0e16;--gold:#c9a227;--gold2:#f0c040;--ice:#00d4ff;--crimson:#8B0000;--paper:#ddd5c0;--mono:'Courier New',monospace;}
html,body{width:100%;background:var(--black);color:var(--paper);font-family:var(--mono);overflow-x:hidden;}
#titleScreen{min-height:640px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:2rem;}
#titleCanvas{position:absolute;inset:0;width:100%;height:100%;}
.t-h1{position:relative;z-index:2;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:0.2em;color:var(--gold2);text-shadow:0 0 40px rgba(240,192,64,0.6);line-height:1.1;margin-bottom:0.3rem;}
.t-sub{position:relative;z-index:2;font-size:0.75rem;letter-spacing:0.4em;color:var(--ice);opacity:0.6;margin-bottom:0.3rem;}
.t-auth{position:relative;z-index:2;font-size:0.68rem;letter-spacing:0.18em;color:rgba(221,213,192,0.4);margin-bottom:2rem;}
.btn-start{position:relative;z-index:2;padding:1rem 3.5rem;border:2px solid var(--gold);color:var(--gold2);background:rgba(201,162,39,0.07);font-family:var(--mono);font-size:0.9rem;letter-spacing:0.25em;cursor:pointer;text-transform:uppercase;transition:all 0.3s;animation:tpulse 2.5s ease-in-out infinite;}
.btn-start:hover{background:rgba(201,162,39,0.2);}
@keyframes tpulse{0%,100%{box-shadow:0 0 10px rgba(201,162,39,0.3)}50%{box-shadow:0 0 30px rgba(201,162,39,0.7)}}
#gameScreen{display:none;flex-direction:column;min-height:640px;}
#gameScreen.active{display:flex;}
#scene{position:relative;height:300px;overflow:hidden;flex-shrink:0;background:#05060a;border-bottom:2px solid rgba(201,162,39,0.12);}
.plyr{position:absolute;inset:0;width:100%;height:100%;transition:transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94);}
#lSky{z-index:1;}#lFog{z-index:2;}#lArch{z-index:3;}#lKnight{z-index:4;}#lFg{z-index:5;}#lZombies{z-index:6;pointer-events:none;}
#roomTag{position:absolute;top:10px;left:14px;font-size:0.85rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);text-shadow:0 0 12px rgba(201,162,39,0.9);z-index:10;}
#loreTag{position:absolute;top:10px;right:14px;max-width:200px;font-size:0.6rem;line-height:1.55;color:rgba(221,213,192,0.48);font-style:italic;text-align:right;z-index:10;}
#npcHint{position:absolute;bottom:94px;left:14px;z-index:12;font-size:0.68rem;color:var(--ice);letter-spacing:0.08em;cursor:pointer;background:rgba(8,9,14,0.75);padding:3px 8px;border:1px solid rgba(0,212,255,0.25);display:none;}
#paintingHint{position:absolute;bottom:70px;left:14px;z-index:12;font-size:0.68rem;color:#aaa;letter-spacing:0.08em;cursor:pointer;background:rgba(8,9,14,0.75);padding:3px 8px;border:1px solid rgba(160,160,160,0.25);display:none;animation:fadeHint 2s ease-in-out infinite;}
@keyframes fadeHint{0%,100%{opacity:0.5}50%{opacity:1}}
#noteHint{position:absolute;bottom:46px;left:14px;z-index:12;font-size:0.68rem;color:var(--gold);letter-spacing:0.08em;cursor:pointer;background:rgba(8,9,14,0.75);padding:3px 8px;border:1px solid rgba(201,162,39,0.25);display:none;}
#itemArea{position:absolute;bottom:10px;right:12px;z-index:15;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
#itemLabel{font-size:0.75rem;color:#a8e6a3;letter-spacing:0.1em;text-shadow:0 0 8px rgba(168,230,163,0.6);min-height:18px;}
#grabBtn{display:none;padding:7px 18px;border:1px solid #a8e6a3;color:#a8e6a3;background:rgba(168,230,163,0.1);font-family:var(--mono);font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;animation:gpulse 1.3s ease-in-out infinite;}
#grabBtn:hover{background:rgba(168,230,163,0.25);}
@keyframes gpulse{0%,100%{box-shadow:0 0 4px rgba(168,230,163,0.2)}50%{box-shadow:0 0 16px rgba(168,230,163,0.8)}}
#fxBlood{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(150,0,0,0.75),transparent 70%);opacity:0;z-index:20;pointer-events:none;transition:opacity 0.07s;}
#fxGold{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(255,200,0,0.4),transparent 70%);opacity:0;z-index:20;pointer-events:none;transition:opacity 0.15s;}
#fxIce{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(0,212,255,0.25),transparent 70%);opacity:0;z-index:20;pointer-events:none;transition:opacity 0.12s;}
#fxSaint{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(255,220,100,0.7),rgba(255,150,0,0.3) 50%,transparent 80%);opacity:0;z-index:21;pointer-events:none;transition:opacity 0.3s;}
.shake{animation:shake 0.35s ease-in-out;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.modal-wrap{display:none;position:absolute;inset:0;z-index:55;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);}
.modal-wrap.show{display:flex;}
.modal-card{background:#0e0c08;border:1px solid rgba(201,162,39,0.4);max-width:480px;width:92%;padding:1.8rem;position:relative;text-align:center;}
.modal-icon{font-size:1.6rem;margin-bottom:0.8rem;}
.modal-title{font-size:0.78rem;letter-spacing:0.2em;color:var(--gold);margin-bottom:0.9rem;text-transform:uppercase;}
.modal-body{font-size:0.9rem;line-height:1.9;color:rgba(221,213,192,0.85);font-style:italic;margin-bottom:1.4rem;font-family:Georgia,serif;}
.modal-close{padding:0.6rem 2rem;border:1px solid rgba(201,162,39,0.4);color:var(--gold);background:none;font-family:var(--mono);font-size:0.74rem;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;}
.modal-close:hover{background:rgba(201,162,39,0.1);}
#saintModal{display:none;position:absolute;inset:0;z-index:60;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0.92);text-align:center;padding:2rem;}
#saintModal.show{display:flex;background:radial-gradient(ellipse at 50% 40%,rgba(255,200,50,0.25),rgba(8,9,14,0.97));}
#saintText{font-size:clamp(0.9rem,2.5vw,1.2rem);color:var(--gold2);letter-spacing:0.12em;line-height:2;text-shadow:0 0 20px rgba(240,192,64,0.8);max-width:500px;margin-bottom:2rem;}
#saintContinue{padding:0.8rem 3rem;border:2px solid var(--gold2);color:var(--gold2);background:rgba(240,192,64,0.08);font-family:var(--mono);font-size:0.85rem;cursor:pointer;letter-spacing:0.2em;text-transform:uppercase;}
#endOverlay{display:none;position:absolute;inset:0;z-index:50;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0.92);text-align:center;padding:2rem;}
#endOverlay.show{display:flex;}
#endH{font-size:clamp(1.6rem,4vw,2.4rem);margin-bottom:1rem;letter-spacing:0.18em;}
#endP{font-size:0.85rem;color:rgba(221,213,192,0.6);margin-bottom:1.8rem;line-height:1.9;max-width:460px;}
.btn-end{padding:0.8rem 2.5rem;border:1px solid var(--gold);color:var(--gold);background:none;font-family:var(--mono);font-size:0.85rem;letter-spacing:0.15em;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
.btn-end:hover{background:rgba(201,162,39,0.12);}
#lower{display:flex;flex-direction:column;flex:1;background:var(--dark);}
#statusBar{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid rgba(201,162,39,0.08);flex-wrap:wrap;}
.hp-lbl{font-size:0.74rem;letter-spacing:0.15em;color:rgba(221,213,192,0.35);text-transform:uppercase;}
#hpWrap{flex:1;max-width:150px;height:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(139,0,0,0.25);}
#hpFill{height:100%;background:var(--crimson);transition:width 0.4s,background 0.4s;}
#invincTag{font-size:0.68rem;color:#ffd700;display:none;animation:goldGlow 1.2s ease-in-out infinite;}
@keyframes goldGlow{0%,100%{text-shadow:0 0 5px rgba(255,215,0,0.4)}50%{text-shadow:0 0 15px rgba(255,215,0,0.9)}}
#cStatus{font-size:0.72rem;letter-spacing:0.1em;color:var(--ice);text-transform:uppercase;}
#relicCnt{font-size:0.72rem;letter-spacing:0.1em;color:var(--gold);margin-left:auto;}
#mapWrap{padding:8px 10px 4px;border-bottom:1px solid rgba(201,162,39,0.08);}
#mapSvg{width:100%;display:block;}
#invRow{display:flex;flex-wrap:wrap;gap:4px;padding:5px 12px;border-bottom:1px solid rgba(201,162,39,0.06);min-height:28px;align-items:center;}
.ilbl{font-size:0.68rem;color:rgba(221,213,192,0.25);letter-spacing:0.12em;margin-right:4px;text-transform:uppercase;}
.ibadge{font-size:0.65rem;padding:2px 7px;border:1px solid rgba(201,162,39,0.32);color:rgba(201,162,39,0.8);}
.ibadge.saint{border-color:#ffd700;color:#ffd700;text-shadow:0 0 6px rgba(255,215,0,0.5);}
#log{flex:1;overflow-y:auto;padding:8px 14px;font-size:0.78rem;line-height:1.8;min-height:90px;max-height:140px;}
#log::-webkit-scrollbar{width:2px;}
#log::-webkit-scrollbar-thumb{background:var(--gold);}
.ls{color:var(--ice);}.lr{color:var(--gold2);}.li{color:#a8e6a3;}.le{color:rgba(221,213,192,0.28);}.la{color:#a8e6a3;font-weight:bold;}.lw{color:var(--gold2);font-weight:bold;}.ll{color:#ff5555;font-weight:bold;}.lc{color:rgba(221,213,192,0.38);}.lco{color:#ff9944;}.llr{color:rgba(200,180,255,0.65);font-style:italic;}.lev{color:#ff6688;}.lhe{color:#88ffaa;}.lnote{color:var(--gold);font-style:italic;}.lnpc{color:var(--ice);}.lsaint{color:#ffd700;font-weight:bold;}
#combatPanel{display:none;flex-direction:column;border-top:1px solid rgba(139,0,0,0.35);background:rgba(139,0,0,0.05);}
#combatPanel.on{display:flex;}
#combatHdr{padding:6px 14px;font-size:0.74rem;letter-spacing:0.14em;color:var(--crimson);text-transform:uppercase;border-bottom:1px solid rgba(139,0,0,0.18);display:flex;justify-content:space-between;align-items:center;}
#eHpRow{display:flex;align-items:center;gap:6px;}
#eHpBar{width:80px;height:5px;background:rgba(255,255,255,0.05);}
#eHpFill{height:100%;background:#cc2200;transition:width 0.3s;}
#combatBtns{display:flex;gap:6px;padding:8px 14px;}
.cb{flex:1;padding:8px 4px;font-family:var(--mono);font-size:0.74rem;letter-spacing:0.1em;text-transform:uppercase;border:1px solid;cursor:pointer;background:none;transition:all 0.2s;}
.cb-a{border-color:rgba(139,0,0,0.45);color:#ff8844;}.cb-a:hover{background:rgba(139,0,0,0.18);}
.cb-d{border-color:rgba(0,212,255,0.28);color:var(--ice);}.cb-d:hover{background:rgba(0,212,255,0.08);}
.cb-f{border-color:rgba(221,213,192,0.12);color:rgba(221,213,192,0.38);}.cb-f:hover{background:rgba(221,213,192,0.04);}
#dirGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:7px 12px;border-top:1px solid rgba(201,162,39,0.06);}
.db{font-family:var(--mono);font-size:0.74rem;letter-spacing:0.1em;padding:8px 4px;border:1px solid rgba(0,212,255,0.18);color:rgba(0,212,255,0.65);background:none;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
.db:hover:not(:disabled){background:rgba(0,212,255,0.07);border-color:var(--ice);}
.db:disabled{opacity:0.1;cursor:not-allowed;}
#inputRow{display:flex;gap:5px;padding:7px 12px;border-top:1px solid rgba(201,162,39,0.06);}
#cmdIn{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(0,212,255,0.16);color:var(--paper);font-family:var(--mono);font-size:0.76rem;padding:7px 10px;outline:none;}
#cmdIn:focus{border-color:var(--ice);}
#cmdSend{background:none;border:1px solid var(--ice);color:var(--ice);font-family:var(--mono);font-size:0.7rem;padding:7px 14px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
#cmdSend:hover{background:rgba(0,212,255,0.07);}
#fsBtn{background:none;border:1px solid rgba(221,213,192,0.12);color:rgba(221,213,192,0.35);font-family:var(--mono);font-size:0.65rem;padding:7px 9px;cursor:pointer;transition:all 0.2s;}
#fsBtn:hover{border-color:var(--gold);color:var(--gold);}
#achievePanel{position:fixed;top:10px;right:10px;z-index:80;max-width:260px;}
.achieve-pop{background:#0a0c08;border:1px solid var(--gold);padding:10px 14px;margin-bottom:6px;font-size:0.72rem;animation:achieveIn 0.4s ease-out,achieveOut 0.4s ease-in 3.6s forwards;border-left:3px solid var(--gold2);}
.achieve-pop.saint{border-color:#ffd700;border-left-color:#ffd700;background:#0e0c04;}
@keyframes achieveIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes achieveOut{from{opacity:1}to{opacity:0;pointer-events:none}}
.ach-name{color:var(--gold2);letter-spacing:0.1em;margin-bottom:2px;}
.ach-desc{color:rgba(221,213,192,0.5);font-size:0.65rem;}
</style>
</head>
<body>
<div id="achievePanel"></div>
<div id="titleScreen">
  <canvas id="titleCanvas"></canvas>
  <div class="t-h1">KNIGHTS TEMPLAR</div>
  <div class="t-h1" style="font-size:clamp(1rem,2.8vw,1.6rem);letter-spacing:0.38em;color:var(--ice);text-shadow:0 0 20px rgba(0,212,255,0.5)">THE SIEGE OF THE UNDEAD</div>
  <div class="t-sub" style="margin-top:0.5rem">— VERSION V —</div>
  <div class="t-auth">A Text Adventure by Brian Temple</div>
  <button class="btn-start" onclick="startGame()">⚔ BEGIN THE SIEGE ⚔</button>
</div>
<div id="gameScreen">
  <div id="scene">
    <svg class="plyr" id="lSky" viewBox="0 0 700 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"></svg>
    <svg class="plyr" id="lFog" viewBox="0 0 700 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"></svg>
    <svg class="plyr" id="lArch" viewBox="0 0 700 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"></svg>
    <svg class="plyr" id="lKnight" viewBox="0 0 700 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"></svg>
    <svg class="plyr" id="lFg" viewBox="0 0 700 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"></svg>
    <svg class="plyr" id="lZombies" viewBox="0 0 700 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="roomTag"></div><div id="loreTag"></div>
    <div id="npcHint" onclick="talkNPC()"></div>
    <div id="paintingHint" onclick="viewPainting()">🖼 A portrait hangs on the wall…</div>
    <div id="noteHint" onclick="openNote()"></div>
    <div id="itemArea"><div id="itemLabel"></div><button id="grabBtn" onclick="doGrab()">⚔ Take Relic</button></div>
    <div id="fxBlood"></div><div id="fxGold"></div><div id="fxIce"></div><div id="fxSaint"></div>
    <div id="endOverlay"><h2 id="endH"></h2><p id="endP"></p><button class="btn-end" onclick="restartGame()">⚔ Try Again ⚔</button></div>
    <div id="noteModal" class="modal-wrap"><div class="modal-card"><div class="modal-icon">📜</div><div id="noteRef" class="modal-title"></div><div id="noteText" class="modal-body"></div><button class="modal-close" onclick="closeModal('noteModal')">✝ Close</button></div></div>
    <div id="paintModal" class="modal-wrap"><div class="modal-card"><div class="modal-icon">🖼</div><div id="paintTitle" class="modal-title"></div><div id="paintBody" class="modal-body"></div><button class="modal-close" onclick="closeModal('paintModal')">Close</button></div></div>
    <div id="npcModal" class="modal-wrap"><div class="modal-card" style="background:#080c14;border-color:rgba(0,212,255,0.35)"><div class="modal-icon">💬</div><div id="npcName" style="font-size:0.85rem;color:var(--ice);margin-bottom:0.5rem;letter-spacing:0.1em;text-transform:uppercase;"></div><div id="npcText" style="font-size:0.88rem;line-height:1.85;color:rgba(221,213,192,0.8);text-align:left;margin-bottom:1rem;font-family:Georgia,serif;min-height:80px;max-height:160px;overflow-y:auto;"></div><input id="npcInput" style="width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(0,212,255,0.2);color:var(--paper);font-family:var(--mono);font-size:0.75rem;padding:7px 10px;outline:none;margin-bottom:0.7rem;" placeholder="ask about relics / scrolls / order / enemy…" autocomplete="off"/><div style="display:flex;gap:8px;"><button onclick="sendNPCMsg()" style="padding:6px 16px;border:1px solid var(--ice);color:var(--ice);background:none;font-family:var(--mono);font-size:0.7rem;cursor:pointer;">Ask</button><button onclick="closeModal('npcModal')" style="padding:6px 16px;border:1px solid rgba(221,213,192,0.2);color:rgba(221,213,192,0.4);background:none;font-family:var(--mono);font-size:0.7rem;cursor:pointer;">Leave</button></div></div></div>
    <div id="saintModal"><svg id="saintSvg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg"></svg><div id="saintText"></div><button id="saintContinue" onclick="closeSaint()">Continue</button></div>
  </div>
  <div id="lower">
    <div id="statusBar">
      <span class="hp-lbl">HP</span>
      <div id="hpWrap"><div id="hpFill" style="width:100%"></div></div>
      <span id="hpNum">100/100</span>
      <span id="invincTag">⚔ SAINT MICHAEL'S BLESSING ⚔</span>
      <div style="width:1px;height:14px;background:rgba(255,255,255,0.07)"></div>
      <span id="cStatus"></span>
      <span id="relicCnt">Relics 0/6</span>
    </div>
    <div id="mapWrap"><svg id="mapSvg" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg"></svg></div>
    <div id="invRow"><span class="ilbl">Relics:</span><span id="invEmpty" style="font-size:0.65rem;color:rgba(221,213,192,0.18)">none</span></div>
    <div id="log"></div>
    <div id="combatPanel">
      <div id="combatHdr"><span id="eName">⚔ COMBAT</span><div id="eHpRow"><span style="font-size:0.65rem;color:rgba(221,213,192,0.35);margin-right:5px">ENEMY</span><div id="eHpBar"><div id="eHpFill" style="width:100%"></div></div><span id="eHpNum" style="font-size:0.65rem;color:#cc2200;margin-left:5px"></span></div></div>
      <div id="combatBtns"><button class="cb cb-a" onclick="doFight('attack')">⚔ ATTACK</button><button class="cb cb-d" onclick="doFight('defend')">🛡 DEFEND</button><button class="cb cb-f" onclick="doFight('flee')">↩ FLEE</button></div>
    </div>
    <div id="dirGrid">
      <button class="db" id="bN" onclick="move('North')">↑ North</button>
      <button class="db" id="bS" onclick="move('South')">↓ South</button>
      <button class="db" id="bE" onclick="move('East')">→ East</button>
      <button class="db" id="bW" onclick="move('West')">← West</button>
    </div>
    <div id="inputRow">
      <input id="cmdIn" placeholder="attack / go north / get / read / talk monk…" autocomplete="off"/>
      <button id="cmdSend" onclick="submit()">ENTER</button>
      <button id="fsBtn" onclick="toggleFS()">⛶</button>
    </div>
  </div>
</div>
<script>

const NPC_LINES={monk:{default:"*the old monk looks up, eyes hollow but kind* Brother... you still live? God's mercy. I am Brother Aldric. Ask me what you need.",relics:"The six sacred relics were scattered when the curse struck. The Rosary is in the Cloister Walk. The Longsword in the Armory. The Map in the Scriptorium. The Hauberk in the Barracks. Holy Water in the Infirmary. Candles in the Bell Tower. The deeper rooms hold the Skull and the Seal.",scrolls:"Brother Marcus hid scripture scrolls throughout the fortress before he fell. He said the Word would protect whoever found them. Look where men once gathered — and in the darkest places.",enemy:"The Necromancer was once one of us. A Templar scholar who went too deep into forbidden texts. He found something. Something that answered back.",order:"The Order was founded to protect God's people. We failed here. But YOU can end this.",default2:"*whispers* 'The Lord is my shepherd...' Go with God, brother."},knight:{default:"*rattling chains* A living man? I am Sir Edmund of Bruges, captured in the first wave. Ask quickly — before the dead return.",relics:"The Skull of the Martyr is in the Ossuary — the Necromancer prizes it. The Templar Seal is in the Treasury. The others are scattered through the upper fortress.",scrolls:"Scripture. Yes. There is a scroll near me — I couldn't reach it. Find them all. They carry real power here.",enemy:"He comes from the Bone Throne Room to gloat. Tall. Robes like shadow. Eyes like cold fire. His staff has a skull on top that he talks to.",order:"We were betrayed by our own complacency. We grew rich and forgot why we drew our swords. Don't make our mistake.",default2:"*pulls at chains* If you make it back — get me OUT of here. Please."},ghost:{default:"*a translucent Templar flickers* I am what remains of Brother Matthias. I cannot leave this hall. But I can see things the living cannot. Ask me.",relics:"The Templar Seal is in the Treasury. The merchant Ezra knows exactly where. The Skull of the Martyr is in the Ossuary — guarded by something terrible.",scrolls:"The scrolls pulse with divine light only I can see. There are eight, scattered through the fortress. Each one weakens the Necromancer's grip. Collect them all... and something extraordinary will happen.",enemy:"When you face him — remember. He fears the name of God above all things. His power comes from the absence of faith. Your faith IS your armor.",order:"Do you know what we fought for? Not gold. Not land. We fought so that anyone could walk to Jerusalem safely. That is worth dying for. Worth dying AGAIN for.",default2:"*fades slightly* Find the scrolls. Trust in the Lord. And strike true."},merchant:{default:"*a blind old man counting coins by touch* Footsteps that don't drag. You're alive. Good. I am Ezra. Ask me what you need. I charge nothing now — what use is gold to the dead?",relics:"The Templar Seal is in this room — in the locked chest behind me. Defeat the guardian to claim it. The others are scattered through the fortress above.",scrolls:"Sacred scripture, hidden like seeds. Check dark corners, near bodies, behind furniture. The Word of God tends to end up where people prayed last.",enemy:"I sold the Necromancer ancient texts before he fell. I didn't know what he intended. That guilt is mine to carry. End him.",order:"The Templars were the greatest force for good this world has known. Ruthless when needed, merciful when possible, utterly fearless before death. Be worthy of that name today.",default2:"*presses a small coin into your hand* For luck. Go with God."}};

let actx=null;let chantNodes=[];
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function tone(f,t,d,v=0.15,dl=0){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0,a.currentTime+dl);g.gain.linearRampToValueAtTime(v,a.currentTime+dl+0.02);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dl+d);o.start(a.currentTime+dl);o.stop(a.currentTime+dl+d+0.05);}catch(e){}}
function noise(d,v=0.06,f=200){try{const a=ac(),b=a.createBuffer(1,a.sampleRate*d,a.sampleRate),dt=b.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=(Math.random()*2-1);const s=a.createBufferSource();s.buffer=b;const fl=a.createBiquadFilter();fl.type='bandpass';fl.frequency.value=f;fl.Q.value=0.5;const g=a.createGain();g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);s.connect(fl);fl.connect(g);g.connect(a.destination);s.start();}catch(e){}}
function startChant(){stopChant();try{const a=ac();const bf=[110,147,165,220];chantNodes=[];bf.forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=f;const v=[0.08,0.05,0.04,0.03][i];g.gain.setValueAtTime(0,a.currentTime);g.gain.linearRampToValueAtTime(v,a.currentTime+3);o.start();chantNodes.push({o,g});});scheduleChant(a);}catch(e){}}
function scheduleChant(a){const sc=[220,247,261,293,330,370,392,440];let t=a.currentTime+4;const ph=[0,2,1,3,2,4,3,2,1,0,2,3,4,3,2,1,0];ph.forEach((idx,i)=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=sc[idx]*0.5;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+0.3);g.gain.exponentialRampToValueAtTime(0.001,t+1.8);o.start(t);o.stop(t+2);chantNodes.push({o,g});t+=1.6;});if(chantNodes.length>0)setTimeout(()=>scheduleChant(a),(ph.length*1.6+4)*1000);}
function stopChant(){chantNodes.forEach(({o,g})=>{try{g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+1);o.stop(actx.currentTime+1.1);}catch(e){}});chantNodes=[];}

let G={};
function initState(){
  const el=Object.keys(ROOMS).filter(r=>r!==VILLAIN&&r!=='Templar Chapel'&&r!=='Portrait Gallery');
  const sh=[...el].sort(()=>Math.random()-0.5);
  const nr={};ALL_SCROLLS.forEach((sc,i)=>{if(sh[i])nr[sh[i]]=sc;});
  G={cur:'Templar Chapel',inv:[],visited:new Set(['Templar Chapel']),roomData:JSON.parse(JSON.stringify(ROOMS)),over:false,hp:100,maxHp:100,combat:null,cleared:new Set(),noteRooms:nr,readNotes:new Set(),paintings:new Set(),npcsTalked:new Set(),achievements:new Set(),battlesWon:0,invincible:false,saintActive:false,activeNPC:null,npcConvHistory:{}};
}

let twQ=[],twBusy=false;
function log(t,cls,fast=false){twQ.push({t,cls,fast});if(!twBusy)twNext();}
function twNext(){if(!twQ.length){twBusy=false;return;}twBusy=true;const{t,cls,fast}=twQ.shift();const el=document.getElementById('log');const d=document.createElement('div');if(cls)d.className=cls;el.appendChild(d);if(fast){d.textContent=t;el.scrollTop=el.scrollHeight;setTimeout(twNext,25);return;}let i=0;function tick(){if(i<t.length){d.textContent+=t[i++];el.scrollTop=el.scrollHeight;setTimeout(tick,13);}else{el.scrollTop=el.scrollHeight;setTimeout(twNext,28);}}tick();}

function unlock(id){if(G.achievements.has(id))return;G.achievements.add(id);const a=ACHIEVEMENTS[id];const p=document.getElementById('achievePanel');const el=document.createElement('div');el.className='achieve-pop'+(a.isSaint?' saint':'');el.innerHTML=`<div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div>`;p.appendChild(el);setTimeout(()=>el.remove(),4200);log('🏆 Achievement: '+a.name,'lsaint',true);}
function checkAchievements(){if(G.visited.size>=Object.keys(ROOMS).length)unlock('explorer');if(G.inv.length>=REQUIRED)unlock('hunter');if(G.battlesWon>=10)unlock('warrior');if(G.readNotes.size>=ALL_SCROLLS.length)unlock('enlightened');if(G.paintings.size>=PAINTINGS.length)unlock('paintings');if(G.npcsTalked.size>=Object.keys(NPCS).length)unlock('talks');if(G.readNotes.size>=ALL_SCROLLS.length&&G.inv.length>=REQUIRED&&!G.achievements.has('saint'))triggerSaint();}

function triggerSaint(){if(G.saintActive)return;G.saintActive=true;sfx.saint();fx('fxSaint',2000);setTimeout(()=>{const m=document.getElementById('saintModal'),sv=document.getElementById('saintSvg');sv.innerHTML=saintSVG();document.getElementById('saintText').innerHTML='THE HEAVENS OPEN<br><br>Saint Michael the Archangel descends<br><br>"Knight of the Lord — your faith is proven.<br>Take my armor. You are invincible."';m.classList.add('show');},800);}
function closeSaint(){document.getElementById('saintModal').classList.remove('show');G.invincible=true;document.getElementById('invincTag').style.display='inline';const row=document.getElementById('invRow');const b=document.createElement('span');b.className='ibadge saint';b.textContent="⚔ Saint Michael's Armor";row.appendChild(b);document.getElementById('invEmpty').style.display='none';unlock('saint');log("⚔ SAINT MICHAEL'S ARMOR BESTOWED — Invincible and one-shot all enemies!",'lsaint');refreshHP();}

function renderMap(){const svg=document.getElementById('mapSvg');const RW=72,RH=20;let html=`<rect width="640" height="180" fill="#07080d" rx="3"/>`;MAP_CONN.forEach(([a,b])=>{const pa=MAP_FIXED[a],pb=MAP_FIXED[b];if(!pa||!pb)return;const isV=a===VILLAIN||b===VILLAIN,isH=a==='Infirmary'||b==='Infirmary';html+=`<line x1="${pa[0]}" y1="${pa[1]+RH/2}" x2="${pb[0]}" y2="${pb[1]+RH/2}" stroke="${isV?'#5a0000':isH?'#1a4020':'#1e2030'}" stroke-width="1.2" opacity="0.7"/>`;});Object.keys(MAP_FIXED).forEach(name=>{const pos=MAP_FIXED[name];if(!pos)return;const[cx,cy]=pos,isC=name===G.cur,isV=name===VILLAIN,isH=name==='Infirmary',isVis=G.visited.has(name),isClr=G.cleared.has(name),hasItem=G.roomData[name]&&G.roomData[name].item,npc=NPCS[name];let fill='#0a0b12',stroke='#16182a',tc='rgba(221,213,192,0.18)';if(isV){fill='#120002';stroke='#4a0000';tc='rgba(255,80,80,0.5)';}else if(isH){fill='#04100a';stroke='#183818';tc='rgba(100,220,140,0.5)';}else if(isC){fill='#18140a';stroke='#c9a227';tc='#f0c040';}else if(isClr){fill='#050c12';stroke='rgba(0,212,255,0.3)';tc='rgba(0,212,255,0.4)';}else if(isVis){fill='#0c0d14';stroke='#22243a';tc='rgba(201,162,39,0.5)';}html+=`<rect x="${cx-RW/2}" y="${cy}" width="${RW}" height="${RH}" rx="2" fill="${fill}" stroke="${stroke}" stroke-width="${isC?1.8:0.7}"/>`;if(isC)html+=`<rect x="${cx-RW/2}" y="${cy}" width="${RW}" height="2" rx="1" fill="#c9a227" opacity="0.8"/>`;if(hasItem)html+=`<circle cx="${cx+RW/2-5}" cy="${cy+4}" r="3.5" fill="#a8e6a3" opacity="0.8"/>`;if(npc&&!G.npcsTalked.has(npc.id))html+=`<circle cx="${cx-RW/2+5}" cy="${cy+4}" r="3.5" fill="#00d4ff" opacity="0.7"/>`;const sh=name.length>12?name.slice(0,11)+'…':name;html+=`<text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="7.5" fill="${tc}" font-family="Courier New">${sh}</text>`;});html+=`<circle cx="18" cy="172" r="3.5" fill="#a8e6a3" opacity="0.8"/><text x="26" y="176" font-size="7" fill="rgba(221,213,192,0.3)" font-family="Courier New">Relic</text><circle cx="70" cy="172" r="3.5" fill="#00d4ff" opacity="0.7"/><text x="78" y="176" font-size="7" fill="rgba(221,213,192,0.3)" font-family="Courier New">NPC</text><rect x="110" y="168" width="10" height="7" rx="1" fill="#18140a" stroke="#c9a227" stroke-width="1.5"/><text x="124" y="176" font-size="7" fill="rgba(221,213,192,0.3)" font-family="Courier New">You</text><rect x="152" y="168" width="10" height="7" rx="1" fill="#120002" stroke="#4a0000" stroke-width="1"/><text x="166" y="176" font-size="7" fill="rgba(221,213,192,0.3)" font-family="Courier New">Boss</text>`;svg.innerHTML=html;}

function refreshScene(){const d=buildScene(G.cur);document.getElementById('lSky').innerHTML=d.sky;document.getElementById('lFog').innerHTML=d.fog;document.getElementById('lArch').innerHTML=d.arch;document.getElementById('lFg').innerHTML=d.fg;document.getElementById('roomTag').textContent=G.cur;document.getElementById('loreTag').textContent=LORE[G.cur]?'"'+LORE[G.cur]+'"':'';document.getElementById('lKnight').innerHTML=(G.cur===VILLAIN)?'':knightSVG(190,285,0.78,G.invincible);const needsZ=G.roomData[G.cur]&&G.roomData[G.cur].zombie&&!G.cleared.has(G.cur);if(G.cur===VILLAIN)drawZ(1,'necro');else if(needsZ)drawZ(1,'mix');else drawZ(0);const npc=NPCS[G.cur];const nel=document.getElementById('npcHint');if(npc){nel.textContent=npc.icon+' '+npc.name+' — type: talk '+npc.id;nel.style.display='block';}else nel.style.display='none';document.getElementById('paintingHint').style.display=(G.cur==='Portrait Gallery')?'block':'none';const note=G.noteRooms[G.cur];const noel=document.getElementById('noteHint');if(note&&!G.readNotes.has(G.cur)){noel.textContent='A worn scroll lies nearby — type: read';noel.style.display='block';}else noel.style.display='none';refreshGrabBtn();['lSky','lFog','lArch','lFg'].forEach((id,i)=>{const el=document.getElementById(id);el.style.transform=`translateX(${(i+1)*14}px)`;requestAnimationFrame(()=>setTimeout(()=>el.style.transform='translateX(0)',8));});}
function refreshGrabBtn(){const room=G.roomData[G.cur],hasItem=room&&room.item,inC=!!G.combat,btn=document.getElementById('grabBtn'),lbl=document.getElementById('itemLabel');if(hasItem&&!G.over&&!inC){lbl.textContent='✦ '+room.item;btn.style.display='block';}else{lbl.textContent=hasItem&&inC?'✦ '+room.item+' (defeat enemy first)':'';btn.style.display='none';}}
function refreshHP(){const pct=Math.max(0,G.hp/G.maxHp*100),fill=document.getElementById('hpFill');if(G.invincible){fill.style.width='100%';fill.style.background='#ffd700';document.getElementById('hpNum').textContent='BLESSED';}else{fill.style.width=pct+'%';fill.style.background=pct>60?'#8B0000':pct>30?'#cc4400':'#ff2200';document.getElementById('hpNum').textContent=Math.max(0,G.hp)+'/'+G.maxHp;}}
function refreshInv(){const row=document.getElementById('invRow');row.querySelectorAll('.ibadge:not(.saint)').forEach(e=>e.remove());const em=document.getElementById('invEmpty');if(!G.inv.length&&!G.invincible){em.style.display='';return;}em.style.display='none';G.inv.forEach(it=>{const b=document.createElement('span');b.className='ibadge';b.textContent=it;row.appendChild(b);});document.getElementById('relicCnt').textContent='Relics '+G.inv.length+'/'+REQUIRED;}
function refreshDirs(){const r=G.roomData[G.cur],locked=G.over||!!G.combat;[{id:'bN',d:'North'},{id:'bS',d:'South'},{id:'bE',d:'East'},{id:'bW',d:'West'}].forEach(({id,d})=>{document.getElementById(id).disabled=(!r[d]||locked);});}
function refreshCombat(show){document.getElementById('combatPanel').classList.toggle('on',show);document.getElementById('cStatus').textContent=show?'⚔ IN COMBAT':'';if(show&&G.combat){document.getElementById('eName').textContent='⚔ '+G.combat.name.toUpperCase();const pct=Math.max(0,G.combat.hp/G.combat.maxHp*100);document.getElementById('eHpFill').style.width=pct+'%';document.getElementById('eHpNum').textContent=G.combat.hp+'/'+G.combat.maxHp;}}

let zT=[];
function drawZ(count,type){zT.forEach(clearInterval);zT=[];const svg=document.getElementById('lZombies');if(!count){svg.innerHTML='';return;}if(type==='necro'){svg.innerHTML=necroSVG(350,290);return;}const isK=Math.random()>0.5;svg.innerHTML=`<g id="zg0">${isK?kZombie(0,0,0.82):pZombie(0,0,0.78)}</g>`;const el=svg.querySelector('#zg0');if(!el)return;let t=0,dir=1;el.setAttribute('transform','translate(520,274)');const id=setInterval(()=>{t+=dir*0.32;if(t>8||t<-8)dir*=-1;el.setAttribute('transform',`translate(${520+t},274)`);},55);zT.push(id);}

function fx(id,ms){const e=document.getElementById(id);e.style.opacity='1';setTimeout(()=>e.style.opacity='0',ms);}
function shake(){const s=document.getElementById('scene');s.classList.remove('shake');void s.offsetWidth;s.classList.add('shake');}
function showEnd(title,msg,win){document.getElementById('endH').textContent=title;document.getElementById('endH').style.color=win?'#f0c040':'#ff4444';document.getElementById('endP').textContent=msg;document.getElementById('endOverlay').classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}

function openNote(){const note=G.noteRooms[G.cur];if(!note)return;sfx.scroll();G.readNotes.add(G.cur);document.getElementById('noteRef').textContent=note.ref;document.getElementById('noteText').textContent=note.text;document.getElementById('noteModal').classList.add('show');document.getElementById('noteHint').style.display='none';log('You unroll a weathered scroll and read by torchlight…','lnote');log(note.ref,'lnote');renderMap();checkAchievements();}
function viewPainting(){if(G.cur!=='Portrait Gallery')return;const idx=G.paintings.size%PAINTINGS.length;const p=PAINTINGS[idx];G.paintings.add(idx);document.getElementById('paintTitle').textContent=p.title;document.getElementById('paintBody').textContent=p.body;document.getElementById('paintModal').classList.add('show');log('You study the portrait…','lnote');renderMap();checkAchievements();}
function talkNPC(){const npc=NPCS[G.cur];if(!npc)return;G.npcsTalked.add(npc.id);G.activeNPC=npc;document.getElementById('npcName').textContent=npc.icon+' '+npc.name+' — '+npc.title;document.getElementById('npcText').textContent=NPC_LINES[npc.id].default;document.getElementById('npcModal').classList.add('show');document.getElementById('npcInput').focus();log('You approach '+npc.name+'…','lnpc',true);checkAchievements();}
function sendNPCMsg(){const npc=G.activeNPC;if(!npc)return;const input=document.getElementById('npcInput');const msg=input.value.trim().toLowerCase();input.value='';if(!msg)return;const lines=NPC_LINES[npc.id];let reply=lines.default2;if(msg.includes('relic')||msg.includes('item'))reply=lines.relics;else if(msg.includes('scroll')||msg.includes('scripture')||msg.includes('prayer'))reply=lines.scrolls;else if(msg.includes('enemy')||msg.includes('necro')||msg.includes('boss'))reply=lines.enemy;else if(msg.includes('order')||msg.includes('templar')||msg.includes('knight'))reply=lines.order;document.getElementById('npcText').textContent=reply;}

function startCombat(){const isK=Math.random()>0.5;const names=isK?ZNAMES_K:ZNAMES_P;const name=names[Math.floor(Math.random()*names.length)];const hp=G.cur===VILLAIN?150:18+Math.floor(Math.random()*22);G.combat={name,hp,maxHp:hp};sfx.groan();log('⚔ A '+name+' rises before you! Defeat it to claim the relic.','lco');refreshCombat(true);refreshDirs();refreshGrabBtn();}
function doFight(action){if(!G.combat||G.over)return;if(action==='attack'){sfx.sword();const pdmg=G.invincible?9999:(8+Math.floor(Math.random()*14));const crit=G.invincible||Math.random()<0.2;const total=crit?pdmg*2:pdmg;G.combat.hp=Math.max(0,G.combat.hp-total);log(G.invincible?'⚔ DIVINE STRIKE — ONE HIT!':crit?'⚔ CRITICAL! You deal '+total+' damage!':'You strike for '+total+' damage.','lco');refreshCombat(!!G.combat);if(G.combat.hp<=0){endCombat();return;}if(!G.invincible)enemyStrike(false);else log('The blow glances off Saint Michael\\'s golden armor.','lco');}else if(action==='defend'){if(G.invincible){log('You are invincible — attack!','le',true);return;}fx('fxIce',280);log('You raise your shield.','lco');enemyStrike(true);}else if(action==='flee'){if(G.invincible){log('Saint Michael\\'s blessing makes flight unnecessary!','le',true);return;}shake();sfx.hit();const fd=10+Math.floor(Math.random()*8);G.hp=Math.max(1,G.hp-fd);log('You retreat! The '+G.combat.name+' strikes for '+fd+'.','lev');G.combat=null;refreshCombat(false);refreshHP();refreshDirs();refreshGrabBtn();}refreshCombat(!!G.combat);refreshHP();}
function enemyStrike(def){const base=6+Math.floor(Math.random()*10);const dmg=def?Math.floor(base*0.28):base;shake();sfx.hit();fx('fxBlood',280);G.hp=Math.max(0,G.hp-dmg);log(def?'The '+G.combat.name+' strikes — your shield holds! '+dmg+' damage.':'The '+G.combat.name+' attacks for '+dmg+'!','lco');refreshHP();if(G.hp<=0)playerDied();}
function endCombat(){const isN=G.cur===VILLAIN;sfx.pickup();fx('fxGold',450);log('The '+G.combat.name+(isN?' DESTROYED! THE FORTRESS IS FREED!':' crumbles to ash.'),'la');if(isN)unlock('necro');G.battlesWon++;G.cleared.add(G.cur);G.combat=null;refreshCombat(false);refreshDirs();drawZ(0);renderMap();refreshGrabBtn();checkAchievements();if(isN)checkEnd();}

function doGrab(){const room=G.roomData[G.cur];if(!room||!room.item||G.over||G.combat)return;const item=room.item;sfx.pickup();fx('fxGold',550);G.inv.push(item);room.item=null;log('⚔ "'+item+'" claimed! ('+G.inv.length+'/'+REQUIRED+')','la');refreshScene();refreshInv();refreshGrabBtn();renderMap();checkAchievements();checkEnd();}

function enterRoom(name){G.cur=name;G.visited.add(name);ambience(name);refreshScene();renderMap();refreshDirs();refreshInv();log('► '+name,'lr');if(LORE[name])log(LORE[name],'llr');if(G.roomData[name].heal&&!G.invincible){const hp=25+Math.floor(Math.random()*15);sfx.pickup();fx('fxGold',400);G.hp=Math.min(G.maxHp,G.hp+hp);log('The Infirmary restores '+hp+' HP.','lhe');refreshHP();}if(G.roomData[name].trap&&!G.invincible){shake();sfx.hit();fx('fxBlood',220);const td=8+Math.floor(Math.random()*10);G.hp=Math.max(1,G.hp-td);log('A runic trap scorches you for '+td+' damage!','lev');refreshHP();}else if(G.roomData[name].trap&&G.invincible){log('The runic trap flares — Saint Michael\\'s armor absorbs it.','lhe');}if(G.roomData[name].event&&Math.random()<0.5&&!G.invincible){const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];log('— '+ev.msg,'lev');if(ev.dmg){shake();sfx.hit();fx('fxBlood',200);G.hp=Math.max(1,G.hp-ev.dmg);refreshHP();}if(ev.heal){sfx.pickup();fx('fxGold',280);G.hp=Math.min(G.maxHp,G.hp+ev.heal);refreshHP();}}if(name===VILLAIN&&!G.cleared.has(name))setTimeout(()=>startCombat(),350);else if(G.roomData[name].zombie&&!G.cleared.has(name))setTimeout(()=>startCombat(),350);checkAchievements();checkEnd();}
function move(dir){if(!G.roomData[G.cur][dir]||G.over||G.combat)return;sfx.step();log('> go '+dir.toLowerCase(),'lc',true);enterRoom(G.roomData[G.cur][dir]);}

function playerDied(){sfx.death();shake();fx('fxBlood',700);log('You have fallen. The undead claim you.','ll');G.over=true;G.combat=null;refreshCombat(false);refreshDirs();refreshGrabBtn();document.getElementById('cmdIn').disabled=true;setTimeout(()=>showEnd('YOU HAVE FALLEN','Your HP reached zero. Use Defend, seek the Infirmary, find the sacred scrolls.',false),500);}
function checkEnd(){if(G.inv.length>=REQUIRED&&G.cleared.has(VILLAIN)){unlock('hunter');sfx.win();fx('fxGold',1200);log('★ ALL RELICS AND THE NECROMANCER DESTROYED! ★','lw');log('DEUS VULT. THE ORDER ENDURES.','lw');G.over=true;G.combat=null;refreshCombat(false);refreshDirs();refreshGrabBtn();document.getElementById('cmdIn').disabled=true;setTimeout(()=>showEnd('⚔ DEUS VULT ⚔','All 6 sacred relics recovered and the Necromancer destroyed. The fortress is free. You are legend.',true),800);return true;}return false;}

function processCmd(raw){const cmd=raw.trim().toLowerCase().replace(/\\s+/g,' ');if(!cmd||G.over)return;log('> '+raw,'lc',true);if(cmd==='attack'||cmd==='a'){doFight('attack');return;}if(cmd==='defend'||cmd==='d'){doFight('defend');return;}if(cmd==='flee'||cmd==='f'){doFight('flee');return;}if(cmd==='read'||cmd==='scroll'||cmd==='note'){openNote();return;}if(cmd==='examine'||cmd==='portrait'||cmd==='look'||cmd==='paintings'){viewPainting();return;}const tm=cmd.match(/^talk\\s+(\\w+)/);if(tm){const npcE=Object.entries(NPCS).find(([r,n])=>n.id===tm[1]&&r===G.cur);if(npcE)talkNPC();else log('There is no '+tm[1]+' here.','le',true);return;}const am=cmd.match(/^ask\\s+(\\w+)\\s+about\\s+(.+)/);if(am){const npcE=Object.entries(NPCS).find(([r,n])=>n.id===am[1]&&r===G.cur);if(npcE){G.activeNPC=npcE[1];talkNPC();setTimeout(()=>{document.getElementById('npcInput').value=am[2];sendNPCMsg();},300);}else log('There is no '+am[1]+' here.','le',true);return;}const dm={north:'North',south:'South',east:'East',west:'West'};if(cmd.startsWith('go ')){const w=cmd.slice(3);if(!dm[w]){log('Unknown direction.','le',true);return;}if(G.combat){log('Defeat the enemy first!','le',true);return;}move(dm[w]);return;}if(cmd.startsWith('get')||cmd==='take'){if(G.combat){log('Defeat the enemy first!','le',true);return;}doGrab();return;}log('Try: attack(a) / defend(d) / flee(f) / go [dir] / get / read / talk [npc]','le',true);}
function submit(){const i=document.getElementById('cmdIn');processCmd(i.value);i.value='';}
function toggleFS(){const e=document.getElementById('gameScreen');if(!document.fullscreenElement)e.requestFullscreen&&e.requestFullscreen();else document.exitFullscreen&&document.exitFullscreen();}

function initTitle(){const cv=document.getElementById('titleCanvas');const ctx=cv.getContext('2d');function rsz(){cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;}rsz();window.addEventListener('resize',rsz);const pts=[];for(let i=0;i<65;i++)pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-0.5)*0.28,vy:-(Math.random()*0.45+0.12),r:Math.random()*2+0.5,life:Math.random(),col:Math.random()>0.5?'201,162,39':'0,212,255'});function frame(){ctx.clearRect(0,0,cv.width,cv.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.0025;if(p.life<=0||p.y<0){p.y=cv.height+5;p.x=Math.random()*cv.width;p.life=0.7+Math.random()*0.3;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba('+p.col+','+p.life+')';ctx.fill();});requestAnimationFrame(frame);}frame();}

function startGame(){initState();document.getElementById('titleScreen').style.display='none';const gs=document.getElementById('gameScreen');gs.style.display='flex';gs.classList.add('active');document.getElementById('cmdIn').disabled=false;['endOverlay','noteModal','paintModal','npcModal','saintModal'].forEach(id=>document.getElementById(id).classList.remove('show'));document.getElementById('log').innerHTML='';document.getElementById('relicCnt').textContent='Relics 0/6';document.getElementById('invincTag').style.display='none';refreshHP();refreshInv();startChant();enterRoom('Templar Chapel');log('Collect 6 relics. Find 8 hidden scrolls. Talk to NPCs. Defeat the Necromancer.','ls');log('ATTACK(a) DEFEND(d) FLEE(f) | go [dir] | get | read | talk [name]','ls');}
function restartGame(){stopChant();initState();['endOverlay','noteModal','paintModal','npcModal','saintModal','combatPanel'].forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove('show');el.classList.remove('on');}});document.getElementById('log').innerHTML='';document.getElementById('cmdIn').disabled=false;document.getElementById('relicCnt').textContent='Relics 0/6';document.getElementById('invincTag').style.display='none';refreshHP();refreshInv();startChant();enterRoom('Templar Chapel');log('The fortress resets. The dead rise again. Deus Vult.','ls');}

document.addEventListener('DOMContentLoaded',()=>{document.getElementById('cmdIn').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});document.getElementById('npcInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendNPCMsg();});});
initTitle();
</script>
